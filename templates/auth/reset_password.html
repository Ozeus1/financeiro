{% extends "base.html" %}
{% block title %}Redefinir Senha{% endblock %}

{% block extra_css %}
<style>
body{background:#f1f5f9}
.auth-card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.1);max-width:420px;margin:4rem auto;overflow:hidden}
.auth-header{background:linear-gradient(135deg,#1e3a8a,#4361ee);padding:2rem 1.75rem 1.5rem;color:#fff;text-align:center}
.auth-header-icon{width:56px;height:56px;background:rgba(255,255,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto .75rem}
.auth-title{font-size:1.2rem;font-weight:700;margin:0}
.auth-sub{font-size:.82rem;opacity:.75;margin:.3rem 0 0}
.auth-body{padding:1.75rem}
.auth-label{font-size:.78rem;font-weight:700;color:#374151;margin-bottom:.3rem;display:block}
.auth-input{border-radius:9px;border:1.5px solid #e2e8f0;font-size:.9rem;transition:border-color .15s}
.auth-input:focus{border-color:#4361ee;box-shadow:0 0 0 3px rgba(67,97,238,.1)}
</style>
{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-header-icon"><i class="bi bi-shield-lock"></i></div>
        <h1 class="auth-title">Nova Senha</h1>
        <p class="auth-sub">Escolha uma senha com pelo menos 6 caracteres</p>
    </div>
    <div class="auth-body">
        <form method="POST">
            <div class="mb-3">
                <label class="auth-label">Nova Senha</label>
                <input type="password" class="form-control auth-input" name="new_password"
                       minlength="6" required autofocus>
            </div>
            <div class="mb-4">
                <label class="auth-label">Confirmar Nova Senha</label>
                <input type="password" class="form-control auth-input" name="confirm_password"
                       minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="bi bi-check-lg me-2"></i>Salvar Nova Senha
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-muted small">
                <i class="bi bi-arrow-left me-1"></i>Voltar ao login
            </a>
        </div>
    </div>
</div>
{% endblock %}
